title: Yongil's Research Blog
description: Yongil Kim's research homepage
author: Yongil Kim
github: https://github.com/yong1-kim
about: LG AI Research
disqus_shortname: stackproblems
google_analytics: UA-XXXXXXXX-Y

enableTags: true
tagarray: []

collections:
  project:
    output: true
    permalink: /project/:path/

social:
    - icon: fa-facebook
      link: "#"
    - icon: fa-twitter
      link: "#"
    - icon: fa-linkedin
      link: "#"
    - icon: fa-stack-exchange
      link: "#"
    - icon: fa-github
      link: "https://github.com/yong1-kim"

share:
  twitter_username: github.io
  fb_appid: 1749788565247320

urls:
    - text: My Projects
      url: /projects/
    - text: Paper Reviews
      url: /blog/
    #- text: XML Feed
    #  url: /feed.xml

url: "https://yong1-kim.github.io"
baseurl: ""
paginate: 20
per_page: 20
paginate_path: "/page/:num/"
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false
gems:
  - jekyll-paginate
  - jekyll-gist

compress_html:
  clippings: all
  comments: ["<!-- ", " -->"]
  endings: all
  ignore:
    envs: ['development']
