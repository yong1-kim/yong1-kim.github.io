---
layout: default
title: Paper Reviews
permalink: /blog/
---

<div id="home">
  <h1>Paper Reviews</h1>
  <hr />

  <ol class="posts">
    {% for post in site.posts %}
      <li><a href="{{ post.url }}">{{ post.title }}</a> &raquo; <i><span>{{ post.date | date_to_string }}</span></i></li>
    {% endfor %}
  </ol>
</div>
